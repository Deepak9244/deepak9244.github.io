<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novelist Deepak Jatav | Official Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #ffffff; }
        .gold-text { color: #d4af37; }
        .gold-border { border-color: #d4af37; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="border-b border-gray-800 p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest uppercase">Deepak <span class="gold-text">Jatav</span></h1>
            <div class="space-x-6 hidden md:block text-sm font-bold tracking-widest uppercase">
                <a href="#home" class="hover:text-[#d4af37]">मुख्य पृष्ठ</a>
                <a href="#books" class="hover:text-[#d4af37]">किताबें</a>
                <a href="#read" class="hover:text-[#d4af37]">मुफ़्त पढ़ें</a>
            </div>
        </div>
    </nav>

    <section id="home" class="flex-grow flex items-center justify-center text-center p-10 mt-10">
        <div>
            <p class="gold-text tracking-[0.3em] uppercase text-sm mb-4">द मास्टरमाइंड राइटर</p>
            <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-widest">अंधेरे का <span class="gold-text">साम्राज्य</span></h2>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-10 italic">"हर खाली जगह कोई न कोई राज़ छुपाती है। और मेरा काम? उन राज़ों की नींव हिलाना।"</p>
            
            <a href="#books" class="inline-block border-2 gold-border gold-text px-8 py-3 uppercase font-bold tracking-widest hover:bg-[#d4af37] hover:text-black transition-all">
                किताबें देखें
            </a>
        </div>
    </section>

    <section class="border-t border-gray-900 bg-[#0a0a0a] py-10 text-center">
        <p class="text-gray-500 uppercase tracking-widest text-xs mb-6">सिग्मा पल्स (फॉलो करें)</p>
        <div class="flex justify-center space-x-6 text-2xl">
            <a href="https://instagram.com/dknovel" class="text-gray-600 hover:text-[#d4af37]"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com/dknovelx" class="text-gray-600 hover:text-[#d4af37]"><i class="fab fa-x-twitter"></i></a>
            <a href="https://facebook.com/Novelistdeepakjatav" class="text-gray-600 hover:text-[#d4af37]"><i class="fab fa-facebook"></i></a>
            <a href="https://www.youtube.com/@Novelistdeepakjatav" class="text-gray-600 hover:text-[#d4af37]"><i class="fab fa-youtube"></i></a>
        </div>
    </section>

    <footer class="text-center p-6 border-t border-gray-900 text-xs text-gray-600 uppercase tracking-widest">
        &copy; 2026 Novelist Deepak Jatav. All rights reserved.
    </footer>

</body>
</html>
