<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NilBharat AI - Voice Assistant</title>
    <meta name="description" content="Hindi/English Voice AI Assistant - Powered by Gemini" />
    <meta name="author" content="NilBharat AI" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="NilBharat AI - Voice Assistant" />
    <meta property="og:description" content="Your Hinglish Voice AI Assistant" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://via.placeholder.com/1200x630/8b5cf6/ffffff?text=NilBharat+AI" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NilBharat AI" />
    <meta name="twitter:description" content="Voice-enabled Hindi/English AI Assistant" />
    <meta name="twitter:image" content="https://via.placeholder.com/1200x630/8b5cf6/ffffff?text=NilBharat+AI" />

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇳</text></svg>" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }

      /* Animated background particles */
      body::before {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        top: -200px;
        left: -200px;
        animation: float 20s ease-in-out infinite;
      }

      body::after {
        content: '';
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        bottom: -150px;
        right: -150px;
        animation: float 15s ease-in-out infinite reverse;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(100px, -100px) rotate(120deg); }
        66% { transform: translate(-100px, 100px) rotate(240deg); }
      }

      #root {
        width: 100%;
        max-width: 400px;
        position: relative;
        z-index: 1;
      }

      /* Phone mockup */
      .phone-frame {
        background: linear-gradient(135deg, #f97316 0%, #fb923c 50%, #fdba74 100%);
        border-radius: 48px;
        padding: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 100px rgba(251, 146, 60, 0.3);
        position: relative;
        animation: pulse-glow 3s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 100px rgba(251, 146, 60, 0.3); }
        50% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 120px rgba(251, 146, 60, 0.5); }
      }

      /* Notch */
      .phone-notch {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        height: 28px;
        background: #000;
        border-radius: 0 0 24px 24px;
        z-index: 20;
      }

      .phone-notch::before {
        content: '';
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 6px;
        background: #1a1a1a;
        border-radius: 3px;
      }

      /* Screen */
      .phone-screen {
        background: #000;
        border-radius: 40px;
        height: 700px;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        padding-top: 8px;
        z-index: 20;
        color: #fff;
        font-size: 12px;
      }

      .status-icons {
        display: flex;
        gap: 4px;
      }

      .signal-bar {
        width: 16px;
        height: 12px;
        border: 1px solid #fff;
        border-radius: 2px;
      }

      /* Header */
      .app-header {
        padding: 60px 16px 12px;
        background: linear-gradient(to bottom, rgba(17, 17, 17, 0.95), transparent);
        position: relative;
        z-index: 10;
      }

      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo-section {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #f97316, #ec4899);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        color: white;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
      }

      .app-title {
        color: white;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: -0.5px;
      }

      .profile-btn {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: none;
        border-radius: 50%;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
      }

      .profile-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }

      /* Messages area */
      .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .messages-area::-webkit-scrollbar {
        width: 4px;
      }

      .messages-area::-webkit-scrollbar-track {
        background: transparent;
      }

      .messages-area::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 2px;
      }

      /* Empty state */
      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #6b7280;
      }

      .empty-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #f97316, #ec4899);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        animation: gentle-bounce 2s ease-in-out infinite;
      }

      @keyframes gentle-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .empty-text {
        font-size: 14px;
        text-align: center;
        padding: 0 32px;
      }

      /* Message bubbles */
      .message {
        display: flex;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        justify-content: flex-end;
      }

      .message-bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 20px;
        word-wrap: break-word;
      }

      .message.user .message-bubble {
        background: linear-gradient(135deg, #f97316, #ec4899);
        color: white;
        border-top-right-radius: 4px;
      }

      .message.ai .message-bubble {
        background: rgba(55, 65, 81, 0.8);
        backdrop-filter: blur(10px);
        color: white;
        border-top-left-radius: 4px;
      }

      /* Input area */
      .input-area {
        padding: 8px 16px 24px;
        background: linear-gradient(to top, rgba(17, 17, 17, 0.95), transparent);
      }

      .input-container {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .mic-button {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #06b6d4, #3b82f6);
        border: none;
        border-radius: 50%;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.4);
        position: relative;
      }

      .mic-button:hover {
        transform: scale(1.05);
      }

      .mic-button.listening {
        background: linear-gradient(135deg, #10b981, #059669);
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        50% {
          transform: scale(1.1);
          box-shadow: 0 4px 24px rgba(16, 185, 129, 0.6);
        }
      }

      .mic-icon {
        width: 24px;
        height: 24px;
      }

      .input-field {
        flex: 1;
        background: rgba(55, 65, 81, 0.5);
        backdrop-filter: blur(10px);
        border: none;
        outline: none;
        padding: 12px 16px;
        border-radius: 24px;
        color: white;
        font-size: 14px;
      }

      .input-field::placeholder {
        color: rgba(156, 163, 175, 0.8);
      }

      /* Speaking indicator */
      .speaking-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
        color: #06b6d4;
        font-size: 12px;
      }

      .sound-wave {
        display: flex;
        gap: 2px;
      }

      .sound-bar {
        width: 3px;
        height: 12px;
        background: #06b6d4;
        border-radius: 2px;
        animation: wave 1s ease-in-out infinite;
      }

      .sound-bar:nth-child(2) {
        animation-delay: 0.1s;
      }

      .sound-bar:nth-child(3) {
        animation-delay: 0.2s;
      }

      @keyframes wave {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1); }
      }

      /* Home indicator */
      .home-indicator {
        display: flex;
        justify-content: center;
        padding: 8px 0;
      }

      .home-bar {
        width: 128px;
        height: 4px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
      }

      /* Loading state */
      .loading {
        display: flex;
        gap: 4px;
        padding: 12px 16px;
      }

      .loading-dot {
        width: 8px;
        height: 8px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }

      .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        
        <div class="phone-screen">
          <!-- Status Bar -->
          <div class="status-bar">
            <div>9:41</div>
            <div class="status-icons">
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
              <div class="signal-bar"></div>
            </div>
          </div>

          <!-- Header -->
          <div class="app-header">
            <div class="header-content">
              <div class="logo-section">
                <div class="logo">NB</div>
                <h1 class="app-title">NilBarat AI</h1>
              </div>
              <button class="profile-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </button>
            </div>
          </div>

          <!-- Messages Area -->
          <div class="messages-area" id="messagesArea">
            <div class="empty-state">
              <div class="empty-icon">🇮🇳</div>
              <p class="empty-text">नमस्ते! Hindi/English में पूछो</p>
            </div>
          </div>

          <!-- Input Area -->
          <div class="input-area">
            <div class="input-container">
              <button class="mic-button" id="micButton">
                <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                  <line x1="12" y1="19" x2="12" y2="23"></line>
                  <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
              </button>
              <input 
                type="text" 
                class="input-field" 
                id="inputField"
                placeholder="Send Dt arean"
              />
            </div>
            <div id="speakingIndicator" style="display: none;" class="speaking-indicator">
              <div class="sound-wave">
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
                <div class="sound-bar"></div>
              </div>
              <span>बोल रहा हूँ...</span>
            </div>
          </div>

          <!-- Home Indicator -->
          <div class="home-indicator">
            <div class="home-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "AIzaSyBAn76raH1JpVabFpdmHkOpKXW7u5_j7pQ";
      let isListening = false;
      let isSpeaking = false;
      let recognition = null;

      const messagesArea = document.getElementById('messagesArea');
      const micButton = document.getElementById('micButton');
      const inputField = document.getElementById('inputField');
      const speakingIndicator = document.getElementById('speakingIndicator');

      // Initialize
      messagesArea.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🇮🇳</div>
          <p class="empty-text">नमस्ते! Hindi/English में पूछो</p>
        </div>
      `;

      // Voice Recognition
      micButton.addEventListener('click', handleVoiceInput);

      function handleVoiceInput() {
        if (!('webkitSpeechRecognition' in window)) {
          alert('Voice input Chrome/Edge में काम करता है।');
          return;
        }

        if (isListening) {
          recognition?.stop();
          return;
        }

        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'hi-IN';

        recognition.onstart = () => {
          isListening = true;
          micButton.classList.add('listening');
        };

        recognition.onend = () => {
          isListening = false;
          micButton.classList.remove('listening');
        };

        recognition.onresult = async (event) => {
          const transcript = event.results[0][0].transcript;
          inputField.value = transcript;
          await handleSend(transcript);
        };

        recognition.onerror = () => {
          isListening = false;
          micButton.classList.remove('listening');
        };

        recognition.start();
      }

      // Send Message
      inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          handleSend(inputField.value);
        }
      });

      async function handleSend(text) {
        if (!text.trim()) return;

        // Remove empty state
        if (messagesArea.querySelector('.empty-state')) {
          messagesArea.innerHTML = '';
        }

        // Add user message
        addMessage(text, 'user');
        inputField.value = '';

        // Show loading
        const loadingId = addLoadingMessage();

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{
                  role: 'user',
                  parts: [{ text: `You are NilBharat AI. Answer in Hindi/English conversationally. Question: ${text}` }]
                }],
                generationConfig: {
                  temperature: 0.9,
                  maxOutputTokens: 500,
                },
              })
            }
          );

          const data = await response.json();
          
          // Remove loading
          removeLoadingMessage(loadingId);

          if (data.candidates && data.candidates[0]?.content) {
            const answer = data.candidates[0].content.parts[0].text;
            addMessage(answer, 'ai');
            speakText(answer);
          }
        } catch (error) {
          removeLoadingMessage(loadingId);
          addMessage('सॉरी, error आया। फिर try करें।', 'ai');
        }
      }

      function addMessage(text, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
      }

      function addLoadingMessage() {
        const id = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = id;
        loadingDiv.className = 'message ai';
        loadingDiv.innerHTML = `
          <div class="message-bubble">
            <div class="loading">
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
            </div>
          </div>
        `;
        messagesArea.appendChild(loadingDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        return id;
      }

      function removeLoadingMessage(id) {
        document.getElementById(id)?.remove();
      }

      function speakText(text) {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        isSpeaking = true;
        speakingIndicator.style.display = 'flex';

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.rate = 0.9;

        utterance.onend = () => {
          isSpeaking = false;
          speakingIndicator.style.display = 'none';
        };

        utterance.onerror = () => {
          isSpeaking = false;
          speakingIndicator.style.display = 'none';
        };

        window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
